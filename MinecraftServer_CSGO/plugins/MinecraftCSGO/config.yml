# UI 설정
ui:
  scoreboard-enabled: true # 스코어보드 표시
  scoreboard-update-interval: 20 # 업데이트 주기 (틱)
  show-money: true # 돈 표시
  show-stats: true # 통계 표시
  show-team: true # 팀 표시

# 통계 설정
stats:
  track-headshots: true # 헤드샷 기록
  track-assists: true # 어시스트 기록
  assist-timeout: 10000 # 어시스트 판정 시간 (밀리초)
  save-stats: false # 통계 저장 (추후 구현)
