# Minecraft CS:GO Plugin Configuration
# Complete Edition v2.0

# 게임 설정
game:
  round-time: 120 # 라운드 시간 (초)
  max-rounds: 30 # 최대 라운드 수
  min-players: 2 # 최소 플레이어 수

# 폭탄 설정
bomb:
  plant-time: 3 # 폭탄 설치 시간 (초)
  defuse-time: 10 # 폭탄 해체 시간 (초)
  explosion-time: 40 # 폭탄 폭발까지 시간 (초)
  defuse-range: 2.0 # 해체 가능 거리 (블록)

# 경제 설정
economy:
  start-money: 800 # 시작 금액
  round-win-bonus: 3250 # 라운드 승리 보상
  round-lose-bonus: 1400 # 라운드 패배 보상
  kill-bonus: 300 # 킬 보상
  assist-bonus: 150 # 어시스트 보상
  max-money: 16000 # 최대 소지금

# 무기 가격
weapons:
  pistol: 200 # 권총
  smg: 1500 # SMG
  rifle: 2700 # 라이플
  sniper: 4750 # 스나이퍼
  shotgun: 1200 # 샷건

# 무기 설정 (데미지, 사거리, 쿨다운)
weapon-stats:
  pistol:
    damage: 10.0
    range: 30.0
    cooldown: 200
  smg:
    damage: 8.0
    range: 25.0
    cooldown: 100
  rifle:
    damage: 15.0
    range: 50.0
    cooldown: 150
  sniper:
    damage: 30.0
    range: 100.0
    cooldown: 800
  shotgun:
    damage: 12.0
    range: 15.0
    cooldown: 600

# 스폰 위치 (게임 내에서 /csgo setspawn 으로 설정)
